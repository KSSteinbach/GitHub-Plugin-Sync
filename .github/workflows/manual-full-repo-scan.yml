name: Manual Full Repo Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-scan:
    name: Bandit + flake8 + detect-secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scan tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit flake8 detect-secrets

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run flake8 (full repo)
        run: |
          flake8 . \
            --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s' \
            > reports/flake8.txt || true

      - name: Run Bandit (recursive)
        run: |
          bandit -r . -f json -o reports/bandit.json || true

      - name: Run detect-secrets (all files)
        run: |
          detect-secrets scan --all-files . > reports/detect-secrets.baseline || true

      - name: Summarize results and fail on findings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          reports = Path("reports")

          # flake8
          flake8_file = reports / "flake8.txt"
          flake8_lines = []
          if flake8_file.exists():
              flake8_lines = [line.strip() for line in flake8_file.read_text(encoding="utf-8", errors="ignore").splitlines() if line.strip()]
          flake8_count = len(flake8_lines)

          # bandit
          bandit_file = reports / "bandit.json"
          bandit_count = 0
          bandit_metrics = {}
          if bandit_file.exists():
              try:
                  bandit_data = json.loads(bandit_file.read_text(encoding="utf-8", errors="ignore"))
                  bandit_count = len(bandit_data.get("results", []))
                  bandit_metrics = bandit_data.get("metrics", {})
              except Exception:
                  pass

          # detect-secrets
          ds_file = reports / "detect-secrets.baseline"
          detect_secrets_count = 0
          if ds_file.exists():
              try:
                  ds_data = json.loads(ds_file.read_text(encoding="utf-8", errors="ignore"))
                  for _, findings in ds_data.get("results", {}).items():
                      detect_secrets_count += len(findings)
              except Exception:
                  pass

          summary = f"""# Scan Summary

          - **flake8 findings:** {flake8_count}
          - **Bandit findings:** {bandit_count}
          - **detect-secrets findings:** {detect_secrets_count}
          """

          summary_file = Path(
              __import__("os").environ.get("GITHUB_STEP_SUMMARY", "step_summary.md")
          )
          summary_file.write_text(summary, encoding="utf-8")

          print(summary)

          if flake8_count > 0 or bandit_count > 0 or detect_secrets_count > 0:
              raise SystemExit(1)
          PY

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-repo-scan-reports
          path: reports/

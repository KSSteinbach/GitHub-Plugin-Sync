name: Build QGIS Plugin ZIP (manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/Tag/Commit (leer = default branch)"
        required: false
        default: ""
      plugin_dir:
        description: "Pfad zum Plugin-Ordner im Repo"
        required: true
        default: "github_plugin_sync"
      zip_base:
        description: "Basisname der ZIP (ohne Version, ohne .zip) – leer = Ordnername"
        required: false
        default: ""

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Read version from metadata.txt
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          META="${{ inputs.plugin_dir }}/metadata.txt"
          test -f "$META"

          # robust: akzeptiert "version=1.2.3" und auch "version = 1.2.3"
          VERSION="$(awk -F= '
            BEGIN{v=""}
            $1 ~ /^[[:space:]]*version[[:space:]]*$/ {
              v=$2
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", v)
              print v
              exit
            }' "$META")"

          if [ -z "$VERSION" ]; then
            echo "Konnte Version nicht aus metadata.txt lesen (Schlüssel: version=...)." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      
      - name: Create QGIS plugin zip (root folder = plugin folder)
        id: package
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_DIR="${{ inputs.plugin_dir }}"
          BASE_INPUT="${{ inputs.zip_base }}"
          VERSION="${{ steps.meta.outputs.version }}"

          BASE="$(basename "$PLUGIN_DIR")"
          if [ -n "$BASE_INPUT" ]; then
            BASE="$BASE_INPUT"
          fi

          STAMP="$(TZ=Europe/Berlin date +'%Y%m%d-%H%M%S')"
          ZIP_FILE="${BASE}_v${VERSION}_${STAMP}.zip"
          
          # sicherstellen, dass Plugin-Ordner existiert
          test -d "$GITHUB_WORKSPACE/${PLUGIN_DIR}"
          

          # --- LICENSE & README nur temporär beilegen ---
          SRC_LICENSE="$GITHUB_WORKSPACE/LICENSE"
          DST_LICENSE="$GITHUB_WORKSPACE/${PLUGIN_DIR}/LICENSE"

          # README kann unterschiedlich heißen -> robust suchen
          SRC_README=""
          for f in "README.md" "Readme.md" "readme.md"; do
            if [ -f "$GITHUB_WORKSPACE/$f" ]; then
              SRC_README="$GITHUB_WORKSPACE/$f"
              break
            fi
          done
          DST_README="$GITHUB_WORKSPACE/${PLUGIN_DIR}/README.md"

          cleanup() {
            rm -f "$DST_LICENSE" "$DST_README" || true
          }
          trap cleanup EXIT

          if [ -f "$SRC_LICENSE" ]; then
            cp "$SRC_LICENSE" "$DST_LICENSE"
            echo "INFO: LICENSE temporär in Plugin-Ordner kopiert."
          else
            echo "WARN: LICENSE im Repo-Root nicht gefunden, wird nicht mitgepackt."
          fi

          if [ -n "$SRC_README" ]; then
            cp "$SRC_README" "$DST_README"
            echo "INFO: README temporär in Plugin-Ordner kopiert (Quelle: $(basename "$SRC_README"))."
          else
            echo "WARN: README.md/Readme.md/readme.md im Repo-Root nicht gefunden, wird nicht mitgepackt."
          fi

          # --- ZIP bauen (Root folder = Plugin folder) ---
          PARENT="$(dirname "$PLUGIN_DIR")"
          FOLDER="$(basename "$PLUGIN_DIR")"

          cd "$PARENT"
          zip -r "$GITHUB_WORKSPACE/$ZIP_FILE" "$FOLDER" \
            -x "**/.git/**" "**/__pycache__/**" "**/*.pyc" "**/.DS_Store" "**/__MACOSX/**"

          echo "zip_path=$GITHUB_WORKSPACE/$ZIP_FILE" >> "$GITHUB_OUTPUT"


      - name: Upload plugin zip as non-zipped artifact
        uses: actions/upload-artifact@v7
        with:
          name: qgis-plugin-${{ steps.meta.outputs.version }}
          path: ${{ steps.package.outputs.zip_path }}
          archive: false
          retention-days: 14
